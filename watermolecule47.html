<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Water Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #414245; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute; top: 70px; left: 20px;
            background: rgba(0, 0, 0, 0.85); padding: 15px;
            border-radius: 10px; color: #eee;
            border-left: 5px solid #00d2ff; width: 300px;
            transition: opacity 0.3s, transform 0.3s, visibility 0.3s;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        #info.hidden {
            opacity: 0; transform: translateX(-50px);
            visibility: hidden; pointer-events: none;
        }
        #togglePanel {
            position: absolute; top: 20px; left: 20px;
            width: 40px; height: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00d2ff; color: #00d2ff;
            border-radius: 5px; cursor: pointer;
            font-size: 20px; display: flex;
            align-items: center; justify-content: center;
            z-index: 101;
        }
        .stat-value { font-size: 20px; color: #00d2ff; font-weight: bold; font-family: monospace; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        .config-group { margin: 8px 0; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 5px; }
        label { display: block; margin: 3px 0; font-size: 11px; }
        input[type="number"], select { width: 100%; padding: 4px; background: #333; border: 1px solid #555; border-radius: 3px; color: white; font-size: 11px; }
        button { width: 100%; padding: 8px; background: #00d2ff; border: none; border-radius: 5px; color: #111; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 11px; }
        button:hover { background: #00b8e8; }
        .reaction-log { margin-top: 10px; font-size: 10px; color: #66ff66; height: 60px; overflow: hidden; }
        .ion-text { color: #ff6b6b; }
        .hydronium-text { color: #00d2ff; }
        .hydroxide-text { color: #00ff88; }
        .perf-indicator { margin-top: 10px; font-size: 10px; color: #888; padding-top: 8px; border-top: 1px solid #444; }
        .perf-good { color: #00ff88; }
        .perf-warning { color: #ffcc00; }
        .perf-bad { color: #ff4444; }
        .info-row { display: flex; justify-content: space-between; align-items: baseline; margin: 5px 0; }
        .energy-display { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        h1 { margin: 0 0 10px 0; font-size: 16px; }
    </style>
</head>
<body>
<div id="togglePanel" title="Show/Hide Stats Panel">☰</div>
<div id="info">
    <h1>Liquid Water + Reactions</h1>
    <div class="config-group">
        <label>Water Molecules</label>
        <input type="number" id="waterCount" value="500" min="100" max="50000" step="100">
    </div>
    <div class="config-group">
        <label>Methane Molecules</label>
        <input type="number" id="methaneCount" value="10" min="0" max="500">
    </div>
    <div class="config-group">
        <label>Quality Level</label>
        <select id="qualityLevel">
            <option value="high" selected>High</option>
            <option value="low">Low</option>
        </select>
    </div>
    <button id="restartBtn">Reset</button>
    <p class="info-row"><span class="stat-label">O-O Distance</span><span id="val" class="stat-value">0.0</span></p>
    <p class="info-row"><span class="stat-label">pH Level</span><span id="ph" class="stat-value">7.00</span></p>
    <div class="energy-display">
        <div>
            <span class="stat-label">Total Energy</span><br>
            <span id="energy" class="stat-value">0.0</span> SEU
        </div>
        <div>
            <span class="stat-label">Speed</span><br>
            <span id="speed" class="stat-value">0.0</span> Å/frame
        </div>
    </div>
    <p style="font-size:9px; color:#aaa; margin-top:5px;">SEU normalized to H₂O; Speed: average molecular velocity</p>
    <p class="perf-indicator" id="moleculeCount" style="margin-top:10px; margin-bottom:10px;">0 H₂O</p>
    <p style="font-size:10px; color:#888; margin-top:8px;">2 CH₄ → C₂H₆ + H₂ | 2 H₂O ⇌ H₃O⁺ + OH⁻</p>
    <p class="reaction-log" id="reactionLog"></p>
    <p style="margin-top:10px; font-size:10px; color:#888;">
        <span class="stat-label">FPS</span><br>
        <span id="fps" class="stat-value">60</span>
    </p>
</div>
<canvas id="simCanvas"></canvas>
<script>
const canvas = document.getElementById('simCanvas'), ctx = canvas.getContext('2d');
const valEl = document.getElementById('val'), fpsEl = document.getElementById('fps');
const moleculeCountEl = document.getElementById('moleculeCount'), phEl = document.getElementById('ph');
const reactionLogEl = document.getElementById('reactionLog'), restartBtn = document.getElementById('restartBtn');
const waterInput = document.getElementById('waterCount'), methaneInput = document.getElementById('methaneCount');
const qualityInput = document.getElementById('qualityLevel'), toggleBtn = document.getElementById('togglePanel');
const infoPanel = document.getElementById('info');
const energyEl = document.getElementById('energy'), speedEl = document.getElementById('speed');

let waterMoleculeCount = parseInt(waterInput.value), methaneMoleculeCount = parseInt(methaneInput.value);
let qualityLevel = qualityInput.value, gridCellSize = 120, PIXELS_PER_ANGSTROM = 10.4;
let reactionCooldown = 0, currentFrame = 0, width, height;
const REACTION_DISTANCE_CH4 = 55, REACTION_DISTANCE_IONS = 50;
const AUTOIONIZATION_PROBABILITY = 0.02, AUTOIONIZATION_COOLDOWN = 30;
const ION_RECOMBINATION_COOLDOWN = 60;
const COULOMB_CONSTANT = 2.5, MIN_DISTANCE = 8;
const FRICTION = 0.999, BOUNDS_DAMPING = 0.95, ROTATIONAL_FRICTION = 0.985;
const COLLISION_POINTS = {
    'H2O': [[0, 0, 6], [-10, 9, 3], [10, 9, 3]],
    'CH4': [[0, 0, 8], [12, 0, 3], [0, 12, 3], [-12, 0, 3], [0, -12, 3]],
    'C2H6': [[-8, 0, 7], [8, 0, 7], [-14, -6, 3], [-14, 6, 3], [-22, 0, 3], [14, -6, 3], [14, 6, 3], [22, 0, 3]],
    'H2': [[-4, 0, 3], [4, 0, 3]],
    'H3O+': [[0, 0, 7], [0, -12, 3], [10, 6, 3], [-10, 6, 3]],
    'OH-': [[0, 0, 7], [0, -12, 3]]
};
const MOLECULE_CHARGE = { 'H2O': 0, 'CH4': 0, 'C2H6': 0, 'H2': 0, 'H3O+': 1, 'OH-': -1 };
const ROTATIONAL_MOLECULES = ['CH4', 'C2H6'];

let grid = [], gridCols = 0, gridRows = 0, gridTotal = 0;
let molecules = [];

function resize() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    initGrid();
}
window.addEventListener('resize', resize);

toggleBtn.addEventListener('click', () => infoPanel.classList.toggle('hidden'));
qualityInput.addEventListener('change', () => { qualityLevel = qualityInput.value; });

class Molecule {
    constructor(type = 'H2O', createdFrame = 0) {
        this.type = type; this.createdFrame = createdFrame;
        this.reset();
    }
    reset() {
        this.x = Math.random() * width; this.y = Math.random() * height;
        const speed = Math.random() * 0.5 + 0.2;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.angle = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.02; this.torque = 0;
    }
    canRecombine() { return (currentFrame - this.createdFrame) >= ION_RECOMBINATION_COOLDOWN; }
    getCollisionPoints() {
        const cos = Math.cos(this.angle), sin = Math.sin(this.angle);
        return (COLLISION_POINTS[this.type] || [[0, 0, 6]]).map(([ox, oy, r]) => ({
            x: Math.round(ox * cos - oy * sin) + this.x,
            y: Math.round(ox * sin + oy * cos) + this.y, r: r
        }));
    }
    draw(ctx, quality) {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        switch(this.type) {
            case 'H2O': this.drawWater(ctx, quality); break;
            case 'CH4': this.drawMethane(ctx, quality); break;
            case 'C2H6': this.drawEthane(ctx, quality); break;
            case 'H2': this.drawHydrogen(ctx, quality); break;
            case 'H3O+': this.drawHydronium(ctx, quality); break;
            case 'OH-': this.drawHydroxide(ctx, quality); break;
        }
        ctx.restore();
    }
    drawWater(ctx, quality) {
        if (quality === 'low') { ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill(); return; }
        ctx.fillStyle = '#ff4d4d'; ctx.shadowBlur = 8; ctx.shadowColor = '#ff0000'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffffff'; const bondLen = 10, bondAngle = 52.25 * (Math.PI/180);
        ctx.beginPath(); ctx.arc(-bondLen * Math.sin(bondAngle), bondLen * Math.cos(bondAngle), 2.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(bondLen * Math.sin(bondAngle), bondLen * Math.cos(bondAngle), 2.2, 0, Math.PI * 2); ctx.fill();
    }
    drawMethane(ctx, quality) {
        if (quality === 'low') { ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill(); return; }
        ctx.fillStyle = '#000000'; ctx.shadowBlur = 6; ctx.shadowColor = '#000000'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffffff'; const bondLen = 12;
        [0, 90, 180, 270].forEach(a => {
            const rad = a * Math.PI / 180;
            ctx.beginPath(); ctx.arc(bondLen * Math.cos(rad), bondLen * Math.sin(rad), 2.2, 0, Math.PI * 2); ctx.fill();
        });
    }
    drawEthane(ctx, quality) {
        if (quality === 'low') { ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill(); return; }
        const cxC = 16, hRad = 2.2;
        ctx.strokeStyle = '#444'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(-cxC/2 + 4, 0); ctx.lineTo(cxC/2 - 4, 0); ctx.stroke();
        ctx.fillStyle = '#000000'; ctx.shadowBlur = 6; ctx.shadowColor = '#000000'; ctx.beginPath(); ctx.arc(-cxC/2, 0, 6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cxC/2, 0, 6, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 4; ctx.shadowColor = '#ffffff';
        const leftH = [[-14, -6], [-14, 6], [-20, 0]];
        const rightH = [[14, -6], [14, 6], [20, 0]];
        leftH.forEach(([x, y]) => { ctx.beginPath(); ctx.arc(-cxC/2 + x, y, hRad, 0, Math.PI * 2); ctx.fill(); });
        rightH.forEach(([x, y]) => { ctx.beginPath(); ctx.arc(cxC/2 + x, y, hRad, 0, Math.PI * 2); ctx.fill(); }); ctx.shadowBlur = 0;
    }
    drawHydrogen(ctx, quality) {
        if (quality === 'low') { ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, 0, 2.2, 0, Math.PI * 2); ctx.fill(); return; }
        ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 4; ctx.shadowColor = '#ffffff'; const bondLen = 8;
        ctx.beginPath(); ctx.arc(-bondLen/2, 0, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(bondLen/2, 0, 3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-bondLen/2 + 3, 0); ctx.lineTo(bondLen/2 - 3, 0); ctx.stroke(); ctx.shadowBlur = 0;
    }
    drawHydronium(ctx, quality) {
        if (quality === 'low') { ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill(); return; }
        ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255, 60, 60, 0.3)'; ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.shadowColor = '#ffffff'; const bondLen = 12, hRad = 2.2;
        [[0, -bondLen], [bondLen * 0.866, bondLen * 0.5], [-bondLen * 0.866, bondLen * 0.5]].forEach(([x, y]) => {
            ctx.beginPath(); ctx.arc(x, y, hRad, 0, Math.PI * 2); ctx.fill();
        }); ctx.shadowBlur = 0;
    }
    drawHydroxide(ctx, quality) {
        if (quality === 'low') { ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill(); return; }
        ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(60, 100, 255, 0.3)'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.shadowColor = '#ffffff'; const bondLen = 12, hRad = 2.2;
        ctx.beginPath(); ctx.arc(0, -bondLen, hRad, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
    }
    update() {
        this.vx *= FRICTION; this.vy *= FRICTION;
        if (ROTATIONAL_MOLECULES.includes(this.type)) { this.rotSpeed += this.torque * 0.01; this.rotSpeed *= ROTATIONAL_FRICTION; this.torque = 0; }
        this.x += this.vx; this.y += this.vy; this.angle += this.rotSpeed;
        const boundaryOffset = 5;
        if (this.x < boundaryOffset) { this.x = boundaryOffset; this.vx *= -BOUNDS_DAMPING; }
        else if (this.x > width - boundaryOffset) { this.x = width - boundaryOffset; this.vx *= -BOUNDS_DAMPING; }
        if (this.y < boundaryOffset) { this.y = boundaryOffset; this.vy *= -BOUNDS_DAMPING; }
        else if (this.y > height - boundaryOffset) { this.y = height - boundaryOffset; this.vy *= -BOUNDS_DAMPING; }
    }
}

function initGrid() {
    gridCols = Math.ceil(width / gridCellSize); gridRows = Math.ceil(height / gridCellSize); gridTotal = gridCols * gridRows;
    grid = new Array(gridTotal); for (let i = 0; i < gridTotal; i++) grid[i] = [];
}
function getGridKey(x, y) { const cellX = Math.floor(x / gridCellSize), cellY = Math.floor(y / gridCellSize); return cellY * gridCols + cellX; }
function buildGrid() { for (let i = 0; i < gridTotal; i++) grid[i].length = 0; molecules.forEach((m, i) => { const key = getGridKey(m.x, m.y); if (key >= 0 && key < gridTotal) grid[key].push(i); }); }
function getNearbyIndices(x, y, distance) {
    const nearby = [], cellRadius = Math.ceil(distance / gridCellSize);
    const cellX = Math.floor(x / gridCellSize), cellY = Math.floor(y / gridCellSize);
    for (let dx = -cellRadius; dx <= cellRadius; dx++) for (let dy = -cellRadius; dy <= cellRadius; dy++) {
        const adjX = cellX + dx, adjY = cellY + dy;
        if (adjX >= 0 && adjX < gridCols && adjY >= 0 && adjY < gridRows) {
            const cellIndex = adjY * gridCols + adjX; if (cellIndex >= 0 && cellIndex < gridTotal) nearby.push(...grid[cellIndex]);
        }
    } return nearby;
}

function applyElectrostaticForces() {
    buildGrid();
    for (let i = 0; i < molecules.length; i++) {
        const m1 = molecules[i], q1 = MOLECULE_CHARGE[m1.type] || 0;
        if (q1 === 0) continue;
        const cellX = Math.floor(m1.x / gridCellSize), cellY = Math.floor(m1.y / gridCellSize);
        for (let dx = -2; dx <= 2; dx++) for (let dy = -2; dy <= 2; dy++) {
            const adjX = cellX + dx, adjY = cellY + dy;
            if (adjX >= 0 && adjX < gridCols && adjY >= 0 && adjY < gridRows) {
                const cellIndex = adjY * gridCols + adjX, nearby = grid[cellIndex];
                for (const j of nearby) {
                    if (j <= i) continue;
                    const m2 = molecules[j], q2 = MOLECULE_CHARGE[m2.type] || 0;
                    if (q2 === 0) continue;
                    const dx = m1.x - m2.x, dy = m1.y - m2.y, distSq = dx * dx + dy * dy;
                    const dist = Math.sqrt(distSq), effectiveDist = Math.max(dist, MIN_DISTANCE);
                    const force = COULOMB_CONSTANT * q1 * q2 / (effectiveDist * effectiveDist);
                    if (Math.abs(force) < 0.01) continue;
                    const nx = dx / dist, ny = dy / dist;
                    m1.vx += nx * force; m1.vy += ny * force;
                    m2.vx -= nx * force; m2.vy -= ny * force;
                }
            }
        }
    }
}

function resolveCollisions() {
    buildGrid();
    for (let i = 0; i < molecules.length; i++) {
        const m1 = molecules[i], cellX = Math.floor(m1.x / gridCellSize), cellY = Math.floor(m1.y / gridCellSize);
        const points1 = m1.getCollisionPoints();
        for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
            const adjX = cellX + dx, adjY = cellY + dy;
            if (adjX >= 0 && adjX < gridCols && adjY >= 0 && adjY < gridRows) {
                const cellIndex = adjY * gridCols + adjX, nearby = grid[cellIndex];
                for (const j of nearby) {
                    if (j <= i) continue;
                    const m2 = molecules[j], points2 = m2.getCollisionPoints();
                    for (const p1 of points1) for (const p2 of points2) {
                        const dx = p1.x - p2.x, dy = p1.y - p2.y, distSq = dx * dx + dy * dy;
                        const dist = Math.sqrt(distSq), minDist = p1.r + p2.r;
                        if (distSq < minDist * minDist && dist > 0.1) {
                            const overlap = minDist - dist, nx = dx / dist, ny = dy / dist;
                            const distRatio = Math.min(overlap, 10) / 10, force = overlap * 0.1 * distRatio;
                            m1.vx += nx * force; m1.vy += ny * force;
                            m2.vx -= nx * force; m2.vy -= ny * force;
                            if (ROTATIONAL_MOLECULES.includes(m1.type)) { m1.torque += (p1.x - m1.x) * (ny * force) - (p1.y - m1.y) * (nx * force); }
                            if (ROTATIONAL_MOLECULES.includes(m2.type)) { m2.torque -= (p2.x - m2.x) * (ny * force) - (p2.y - m2.y) * (nx * force); }
                        }
                    }
                }
            }
        }
    }
}

function initMolecules() {
    molecules = [];
    for (let i = 0; i < waterMoleculeCount; i++) molecules.push(new Molecule('H2O'));
    for (let i = 0; i < methaneMoleculeCount; i++) molecules.push(new Molecule('CH4'));
}
let waterPairsForAutoionization = [];

function physicsAndMeasure() {
    let sumDist = 0, waterCount = 0, validDistances = 0, reactedIndices = new Set();
    waterPairsForAutoionization = [];
    if (reactionCooldown > 0) reactionCooldown--;
    buildGrid();
    for (let i = 0; i < molecules.length; i++) {
        let m1 = molecules[i];
        if (m1.type === 'H2O') {
            waterCount++; let minDist = Infinity;
            let nearby = getNearbyIndices(m1.x, m1.y, REACTION_DISTANCE_IONS + 20);
            for (let k = 0; k < nearby.length; k++) {
                let j = nearby[k];
                if (i === j || reactedIndices.has(i) || reactedIndices.has(j)) continue;
                let m2 = molecules[j], dx = m1.x - m2.x, dy = m1.y - m2.y, distSq = dx * dx + dy * dy, dist = Math.sqrt(distSq);
                if (dist < minDist) minDist = dist;
                if (distSq < 2500) {
                    let force = (Math.sqrt(2500) - dist) / Math.sqrt(2500), angle = Math.atan2(dy, dx), dampFactor = 0.5;
                    let fx = Math.cos(angle) * force * dampFactor, fy = Math.sin(angle) * force * dampFactor;
                    m1.vx += fx; m1.vy += fy; m2.vx -= fx; m2.vy -= fy;
                    if (m2.type === 'H2O' && !reactedIndices.has(i) && !reactedIndices.has(j) && reactionCooldown === 0) {
                        if (Math.random() < AUTOIONIZATION_PROBABILITY) { reactedIndices.add(i); reactedIndices.add(j); reactionCooldown = AUTOIONIZATION_COOLDOWN; waterPairsForAutoionization.push([i, j]); logReaction('2 H₂O ⇌ H₃O⁺ + OH⁻ (autoionization)'); }
                    }
                }
            } if (minDist < Infinity) { sumDist += minDist; validDistances++; }
        }
        if (m1.type === 'CH4' && !reactedIndices.has(i) && reactionCooldown === 0) {
            let nearby = getNearbyIndices(m1.x, m1.y, REACTION_DISTANCE_CH4 + 20);
            for (let k = 0; k < nearby.length; k++) {
                let j = nearby[k]; if (j <= i || reactedIndices.has(i) || reactedIndices.has(j)) continue;
                let m2 = molecules[j], dx = m1.x - m2.x, dy = m1.y - m2.y, dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < REACTION_DISTANCE_CH4) { reactedIndices.add(i); reactedIndices.add(j); reactionCooldown = 30; logReaction('2 CH₄ → C₂H₆ + H₂'); break; }
            }
        }
    } return { avgDist: validDistances > 0 ? sumDist / validDistances : 0, reactedIndices };
}

function logReaction(msg) {
    const timestamp = new Date().toLocaleTimeString().split(' ')[0];
    const entry = `[${timestamp}] ${msg}`; reactionLogEl.innerText = entry + '\n' + reactionLogEl.innerText;
    const lines = reactionLogEl.innerText.split('\n'); if (lines.length > 4) reactionLogEl.innerText = lines.slice(0, 4).join('\n');
}

function processReactions(reactedIndices) {
    const newMolecules = [], consumedIndices = new Set();
    for (let i = 0; i < molecules.length; i++) {
        if (reactedIndices.has(i) || consumedIndices.has(i)) continue;
        const m1 = molecules[i];
        if ((m1.type === 'H3O+' || m1.type === 'OH-') && m1.canRecombine()) {
            let nearby = getNearbyIndices(m1.x, m1.y, REACTION_DISTANCE_IONS + 20);
            for (let k = 0; k < nearby.length; k++) {
                let j = nearby[k]; if (j <= i || reactedIndices.has(j) || consumedIndices.has(j)) continue;
                const m2 = molecules[j];
                if ((m2.type === 'H3O+' || m2.type === 'OH-') && m2.canRecombine()) {
                    if ((m1.type === 'H3O+' && m2.type === 'OH-') || (m1.type === 'OH-' && m2.type === 'H3O+')) {
                        let dist = Math.sqrt((m1.x - m2.x) ** 2 + (m1.y - m2.y) ** 2);
                        if (dist < REACTION_DISTANCE_IONS) {
                            const midX = (m1.x + m2.x) / 2, midY = (m1.y + m2.y) / 2;
                            const midVx = (m1.vx + m2.vx) / 2, midVy = (m1.vy + m2.vy) / 2, midAngle = (m1.angle + m2.angle) / 2;
                            for (let k = 0; k < 2; k++) { const h2o = new Molecule('H2O'); h2o.x = midX + (Math.random() - 0.5) * 2; h2o.y = midY + (Math.random() - 0.5) * 2; h2o.vx = midVx; h2o.vy = midVy; h2o.angle = midAngle + (Math.random() - 0.5) * 0.1; newMolecules.push(h2o); }
                            logReaction('H₃O⁺ + OH⁻ → 2 H₂O (recombination)'); consumedIndices.add(i); consumedIndices.add(j); break;
                        }
                    }
                }
            }
        }
        if (m1.type === 'CH4') {
            let nearby = getNearbyIndices(m1.x, m1.y, REACTION_DISTANCE_CH4 + 20);
            for (let k = 0; k < nearby.length; k++) {
                let j = nearby[k]; if (j <= i || reactedIndices.has(j) || consumedIndices.has(j)) continue;
                const m2 = molecules[j];
                if (m2.type === 'CH4') {
                    let dist = Math.sqrt((m1.x - m2.x) ** 2 + (m1.y - m2.y) ** 2);
                    if (dist < REACTION_DISTANCE_CH4) {
                        const midX = (m1.x + m2.x) / 2, midY = (m1.y + m2.y) / 2;
                        const midVx = (m1.vx + m2.vx) / 2, midVy = (m1.vy + m2.vy) / 2, midAngle = (m1.angle + m2.angle) / 2;
                        const ethane = new Molecule('C2H6'); ethane.x = midX; ethane.y = midY; ethane.vx = midVx; ethane.vy = midVy; ethane.angle = midAngle; ethane.rotSpeed = (m1.rotSpeed + m2.rotSpeed) / 2; newMolecules.push(ethane);
                        const hydrogen = new Molecule('H2'); hydrogen.x = midX + (Math.random() - 0.5) * 2; hydrogen.y = midY + (Math.random() - 0.5) * 2; hydrogen.vx = midVx; hydrogen.vy = midVy; newMolecules.push(hydrogen);
                        logReaction('2 CH₄ → C₂H₆ + H₂'); consumedIndices.add(i); consumedIndices.add(j); break;
                    }
                }
            }
        }
        if (!consumedIndices.has(i)) newMolecules.push(molecules[i]);
    }
    for (let pair of waterPairsForAutoionization) {
        const i = pair[0], j = pair[1];
        if (i >= 0 && i < molecules.length && j >= 0 && j < molecules.length) {
            const m1 = molecules[i], m2 = molecules[j];
            const midX = (m1.x + m2.x) / 2, midY = (m1.y + m2.y) / 2;
            const midVx = (m1.vx + m2.vx) / 2, midVy = (m1.vy + m2.vy) / 2;
            const ionOffset = (Math.random() - 0.5) * 80;
            const hydronium = new Molecule('H3O+', currentFrame); hydronium.x = midX + ionOffset; hydronium.y = midY; hydronium.vx = midVx; hydronium.vy = midVy; newMolecules.push(hydronium);
            const hydroxide = new Molecule('OH-', currentFrame); hydroxide.x = midX - ionOffset; hydroxide.y = midY; hydroxide.vx = midVx; hydroxide.vy = midVy; newMolecules.push(hydroxide);
        }
    } molecules = newMolecules;
}

function updateUI(avgDist) {
    const displayDist = isFinite(avgDist) ? avgDist.toFixed(2) : 'N/A'; valEl.innerText = displayDist;
    if (isFinite(avgDist)) { valEl.style.color = avgDist < 3.2 ? '#4facfe' : avgDist > 4.0 ? '#ff6b6b' : '#ffcc00'; }
    
    let h2o = 0, ch4 = 0, c2h6 = 0, h2 = 0, h3o = 0, oh = 0;
    let totalKE = 0;
    let totalSpeed = 0;
    molecules.forEach(m => { 
        if (m.type === 'H2O') h2o++; 
        if (m.type === 'CH4') ch4++; 
        if (m.type === 'C2H6') c2h6++; 
        if (m.type === 'H2') h2++; 
        if (m.type === 'H3O+') h3o++; 
        if (m.type === 'OH-') oh++;
        
        // Kinetic energy
        let mass = 1.0;
        if(m.type === 'CH4') mass = 0.89;
        else if(m.type === 'C2H6') mass = 1.67;
        else if(m.type === 'H2') mass = 0.11;
        else if(m.type === 'H3O+') mass = 1.06;
        else if(m.type === 'OH-') mass = 0.94;
        totalKE += 0.5 * mass * (m.vx * m.vx + m.vy * m.vy);
        
        // Speed in Angstroms per frame
        const speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy) / PIXELS_PER_ANGSTROM;
        totalSpeed += speed;
    });
    
    moleculeCountEl.innerText = `${h2o} H₂O + ${ch4} CH₄ + ${c2h6} C₂H₆ + ${h2} H₂ + <span class="hydronium-text">${h3o} H₃O⁺</span> + <span class="hydroxide-text">${oh} OH⁻</span>`;
    
    const avgEnergy = totalKE / (molecules.length || 1);
    const avgSpeed = totalSpeed / (molecules.length || 1);
    
    energyEl.innerText = avgEnergy.toFixed(1);
    energyEl.style.color = Math.abs(avgEnergy - (lastEnergy || 0)) > 0.005 ? '#ff4444' : '#00d2ff';
    lastEnergy = avgEnergy;
    
    speedEl.innerText = avgSpeed.toFixed(2);
    speedEl.style.color = '#00ff88';
    
    const total = h2o + h3o + oh;
    if (total > 0) { const h3o_conc = h3o / total; phEl.innerText = (-Math.log10(h3o_conc + 0.000001)).toFixed(2); } else { phEl.innerText = '7.00'; }
}

let lastTime = Date.now(), frameCount = 0, lastEnergy = 0;

function draw() {
    currentFrame++; ctx.fillStyle = '#414245'; ctx.fillRect(0, 0, width, height);
    let { avgDist, reactedIndices } = physicsAndMeasure();
    processReactions(reactedIndices);
    applyElectrostaticForces();
    resolveCollisions();
    molecules.forEach(m => m.update());
    molecules.forEach(m => m.draw(ctx, qualityLevel));
    updateUI(avgDist);

    frameCount++;
    const now = Date.now();
    if (now - lastTime >= 1000) {
        fpsEl.innerText = frameCount;
        if (frameCount > 50) fpsEl.className = 'stat-value perf-good';
        else if (frameCount > 20) fpsEl.className = 'stat-value perf-warning';
        else fpsEl.className = 'stat-value perf-bad';
        frameCount = 0; lastTime = now;
    } requestAnimationFrame(draw);
}

restartBtn.addEventListener('click', () => { waterMoleculeCount = parseInt(waterInput.value); methaneMoleculeCount = parseInt(methaneInput.value); initMolecules(); });
resize(); initMolecules(); draw();
</script>
