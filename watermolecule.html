<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Water Simulation (Real-time Distance)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #444;
        }
        h1 { margin: 0 0 10px 0; font-size: 18px; color: #4facfe; }
        p { margin: 5px 0; font-size: 14px; }
        .highlight { color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>

<div id="info">
    <h1>Water Molecules in Liquid State (25°C)</h1>
    <p>Simulating <span id="count">0</span> molecules...</p>
    <p>Measured Distance: <span id="distanceVal" class="highlight">Measuring...</span></p>
    <p style="font-size: 11px; color: #aaa;">(Scale: Oxygen ~1.5Å, H-O-H Bond ~0.96Å)</p>
</div>

<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const distanceEl = document.getElementById('distanceVal');
    const countEl = document.getElementById('count');

    // Configuration
    const moleculeCount = 600;
    const scale = 20; // 20 pixels = 3 Angstroms (Approx scale for visibility)
    
    // Angstrom conversions for drawing
    const O_RADIUS_A = 1.52;
    const H_RADIUS_A = 0.37;
    const OH_BOND_A = 0.96;
    const HOH_ANGLE = 104.5; // Degrees
    
    // Canvas setup
    let width, height;
    
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    class Molecule {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            // Random thermal velocity
            const speed = Math.random() * 0.5 + 0.1; 
            const angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            
            // Random rotation of the molecule
            this.angle = Math.random() * Math.PI * 2;
            this.rotSpeed = (Math.random() - 0.5) * 0.05;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            // Draw Oxygen (Red)
            ctx.beginPath();
            // Scale factor: 1 Angstrom approx = scale/3 pixels
            const rO = (O_RADIUS_A / 3) * scale; 
            ctx.fillStyle = '#ff4d4d';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#ff0000';
            ctx.arc(0, 0, rO, 0, Math.PI * 2);
            ctx.fill();

            // Draw Hydrogens (White)
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 2;
            ctx.shadowColor = '#ffffff';

            // H1 position
            const hRad = (H_RADIUS_A / 3) * scale;
            const bondLen = (OH_BOND_A / 3) * scale;
            const halfAngle = (HOH_ANGLE / 2) * (Math.PI / 180);
            
            // Left H
            ctx.beginPath();
            ctx.arc(-bondLen * Math.sin(halfAngle), bondLen * Math.cos(halfAngle), hRad, 0, Math.PI * 2);
            ctx.fill();

            // Right H
            ctx.beginPath();
            ctx.arc(bondLen * Math.sin(halfAngle), bondLen * Math.cos(halfAngle), hRad, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.angle += this.rotSpeed;

            // Bounce off walls
            if (this.x < 0 || this.x > width) this.vx *= -1;
            if (this.y < 0 || this.y > height) this.vy *= -1;
            
            // Keep within bounds
            if (this.x < 0) this.x = 0;
            if (this.x > width) this.x = width;
            if (this.y < 0) this.y = 0;
            if (this.y > height) this.y = height;
        }
    }

    const molecules = [];
    for (let i = 0; i < moleculeCount; i++) {
        molecules.push(new Molecule());
    }
    countEl.innerText = moleculeCount;

    // Physics: Repulsion between molecules (Soft collisions)
    function handleRepulsion() {
        const minDist = 2.8; // Angstroms - typical nearest neighbor
        
        // Only check against random subset for performance, 
        // or all for accuracy. Let's do a distance check loop.
        for (let i = 0; i < molecules.length; i++) {
            let m1 = molecules[i];
            for (let j = i + 1; j < molecules.length; j++) {
                let m2 = molecules[j];
                
                let dx = m1.x - m2.x;
                let dy = m1.y - m2.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                // Calculate real world distance in Angstroms
                // pixels / scale_factor = angstroms
                const pixelScale = 3; // arbitrary constant for calculation
                const distAngstrom = Math.sqrt((dx*dx + dy*dy) / (pixelScale*pixelScale)); // rough math

                if (dist < 40) { // pixels (approx 3 Angstroms in screen space)
                    // Repulsion force
                    let force = (40 - dist) / 40; // Normalize 0 to 1
                    let angle = Math.atan2(dy, dx);
                    let fx = Math.cos(angle) * force * 0.5;
                    let fy = Math.sin(angle) * force * 0.5;

                    m1.vx += fx;
                    m1.vy += fy;
                    m2.vx -= fx;
                    m2.vy -= fy;
                }
            }
        }
    }

    // Measurement Logic
    let p1, p2, lastTime = 0;

    function drawMeasurement() {
        // Pick 2 random molecules every frame to simulate "measurement"
        const idx1 = Math.floor(Math.random() * molecules.length);
        const idx2 = Math.floor(Math.random() * molecules.length);
        const m1 = molecules[idx1];
        const m2 = molecules[idx2];

        const dx = m2.x - m1.x;
        const dy = m2.y - m1.y;
        const distPixels = Math.sqrt(dx*dx + dy*dy);
        
        // Visual Measurement
        ctx.beginPath();
        ctx.moveTo(m1.x, m1.y);
        ctx.lineTo(m2.x, m2.y);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        // Update UI
        // Scale: roughly 3 Angstroms = 1 pixel in this simulation
        // (Calculated: 1 Angstrom ~ 0.33 pixel)
        const distAngstrom = (distPixels / 0.33).toFixed(2);
        
        // Only update text if not changing too fast (noise reduction)
        if (Date.now() - lastTime > 500) {
            distanceEl.innerText = distAngstrom + " Å";
            lastTime = Date.now();
            
            // Color code the result based on typical liquid water distances
            // Nearest neighbor is ~2.8A. Far away is ~3.5A+.
            if (distAngstrom < 3.2) {
                distanceEl.style.color = "#4facfe"; // Blue for bonded/neighbor
            } else {
                distanceEl.style.color = "#aaa"; // Grey for further away
            }
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(26, 26, 26, 0.4)'; // Trail effect
        ctx.fillRect(0, 0, width, height);

        molecules.forEach(m => {
            m.update();
            m.draw(ctx);
        });

        handleRepulsion();
        drawMeasurement();

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
