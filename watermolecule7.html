<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Water: Spatial Average Distance</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            color: #eee;
            border-left: 5px solid #00d2ff;
            width: 320px;
        }
        h1 { margin: 0 0 10px 0; font-size: 18px; }
        p { margin: 5px 0; font-size: 13px; line-height: 1.5; color: #ccc; }
        .stat-value { font-size: 24px; color: #00d2ff; font-weight: bold; font-family: monospace; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    </style>
</head>
<body>

<div id="info">
    <h1>Nearest Neighbor Distance (Spatial Average)</h1>
    <p>
        <span class="stat-label">Average O-O Distance</span><br>
        <span id="val" class="stat-value">Calculating...</span> <span style="font-size:14px; color:#888">Ångströms</span>
    </p>
    <p>
        <span class="stat-label">FPS</span><br>
        <span id="fps" class="stat-value">60</span>
    </p>
    <p style="font-size:11px; color:#888; margin-top:10px;">
        Scale: OH bond = 0.96Å ≈ 10px (2.8Å O-O ≈ 29px)<br>
        Average is calculated across ALL molecules (each finds its nearest neighbor)
    </p>
</div>

<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const valEl = document.getElementById('val');
    const fpsEl = document.getElementById('fps');

    // Scale: pixels per Ångström (OH bond 0.96Å ≈ 10px)
    const PIXELS_PER_ANGSTROM = 10.4;

    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    class Molecule {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            const speed = Math.random() * 0.4 + 0.2;
            const angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.angle = Math.random() * Math.PI * 2;
            this.rotSpeed = (Math.random() - 0.5) * 0.02;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            // Oxygen
            ctx.beginPath();
            ctx.fillStyle = '#ff4d4d';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff0000';
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Hydrogens
            ctx.fillStyle = '#ffffff';
            const bondLen = 10;
            const bondAngle = 52.25 * (Math.PI/180);

            ctx.beginPath();
            ctx.arc(-bondLen * Math.sin(bondAngle), bondLen * Math.cos(bondAngle), 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(bondLen * Math.sin(bondAngle), bondLen * Math.cos(bondAngle), 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.angle += this.rotSpeed;

            if (this.x < 0 || this.x > width) this.vx *= -1;
            if (this.y < 0 || this.y > height) this.vy *= -1;
            
            if (this.x < 0) this.x = 0;
            if (this.x > width) this.x = width;
            if (this.y < 0) this.y = 0;
            if (this.y > height) this.y = height;
        }
    }

    const molecules = [];
    const count = 400;
    for (let i = 0; i < count; i++) {
        molecules.push(new Molecule());
    }

    // Physics & Distance Measurement
    function physicsAndMeasure() {
        let sumDist = 0;
        let moleculeCount = molecules.length;

        for (let i = 0; i < molecules.length; i++) {
            let m1 = molecules[i];
            let minDist = Infinity;

            for (let j = 0; j < molecules.length; j++) {
                if (i === j) continue;
                
                let m2 = molecules[j];
                let dx = m1.x - m2.x;
                let dy = m1.y - m2.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < minDist) {
                    minDist = dist;
                }

                // Repulsion force
                if (dist < 50) {
                    let force = (50 - dist) / 50;
                    let angle = Math.atan2(dy, dx);
                    let fx = Math.cos(angle) * force * 0.3;
                    let fy = Math.sin(angle) * force * 0.3;
                    m1.vx += fx; m1.vy += fy;
                    m2.vx -= fx; m2.vy -= fy;
                }
            }
            sumDist += minDist;
        }

        // Calculate spatial average (sum of all nearest neighbor distances / total molecules)
        let avgDistPixels = sumDist / moleculeCount;
        let avgDistAngstrom = avgDistPixels / PIXELS_PER_ANGSTROM;

        return avgDistAngstrom;
    }

    function updateUI(avgDist) {
        valEl.innerText = avgDist.toFixed(2);
        
        // Color code based on typical liquid water distance (~2.8 Å)
        if (avgDist < 3.2) {
            valEl.style.color = '#4facfe';
        } else {
            valEl.style.color = '#ff6b6b';
        }
    }

    // FPS tracking
    let lastTime = Date.now();
    let frameCount = 0;

    function draw() {
        ctx.fillStyle = 'rgba(17, 17, 17, 0.3)';
        ctx.fillRect(0, 0, width, height);

        // Update physics & movement
        let avgDist = physicsAndMeasure();
        
        // Update all molecules
        molecules.forEach(m => m.update());
        
        // Draw all molecules
        molecules.forEach(m => m.draw(ctx));

        // Update UI (with the returned value)
        updateUI(avgDist);

        frameCount++;
        const now = Date.now();
        if (now - lastTime >= 1000) {
            fpsEl.innerText = frameCount;
            frameCount = 0;
            lastTime = now;
        }

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
