<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Water + CH₄ Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            color: #eee;
            border-left: 5px solid #00d2ff;
            width: 320px;
        }
        h1 { margin: 0 0 10px 0; font-size: 18px; }
        p { margin: 5px 0; font-size: 13px; line-height: 1.5; color: #ccc; }
        .stat-value { font-size: 24px; color: #00d2ff; font-weight: bold; font-family: monospace; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    </style>
</head>
<body>

<div id="info">
    <h1>Liquid Water + Methane (CH₄)</h1>
    <p>
        <span class="stat-label">Average O-O Distance</span><br>
        <span id="val" class="stat-value">Calculating...</span> <span style="font-size:14px; color:#888">Ångströms</span>
    </p>
    <p>
        <span class="stat-label">FPS</span><br>
        <span id="fps" class="stat-value">60</span>
    </p>
    <p>
        <span class="stat-label">Molecules</span><br>
        400 H₂O + 5 CH₄
    </p>
    <p style="font-size:11px; color:#888; margin-top:10px;">
        Scale: OH bond = 0.96Å ≈ 10px (2.8Å O-O ≈ 29px)<br>
        Methane has larger van der Waals radius
    </p>
</div>

<canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const valEl = document.getElementById('val');
    const fpsEl = document.getElementById('fps');

    // Scale: pixels per Ångström (OH bond 0.96Å ≈ 10px)
    const PIXELS_PER_ANGSTROM = 10.4;

    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    class Molecule {
        constructor(isWater = true) {
            this.reset();
            this.isWater = isWater;
        }

        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            const speed = Math.random() * 0.4 + 0.2;
            const angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.angle = Math.random() * Math.PI * 2;
            this.rotSpeed = (Math.random() - 0.5) * 0.02;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            if (this.isWater) {
                // Draw H₂O molecule
                this.drawWater(ctx);
            } else {
                // Draw CH₄ molecule
                this.drawMethane(ctx);
            }

            ctx.restore();
        }

        drawWater(ctx) {
            // Oxygen (Red)
            ctx.beginPath();
            ctx.fillStyle = '#ff4d4d';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff0000';
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Hydrogens (White)
            ctx.fillStyle = '#ffffff';
            const bondLen = 10;
            const bondAngle = 52.25 * (Math.PI/180);

            ctx.beginPath();
            ctx.arc(-bondLen * Math.sin(bondAngle), bondLen * Math.cos(bondAngle), 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(bondLen * Math.sin(bondAngle), bondLen * Math.cos(bondAngle), 2, 0, Math.PI * 2);
            ctx.fill();
        }

        drawMethane(ctx) {
            // Carbon (Black - center of tetrahedron)
            ctx.beginPath();
            ctx.fillStyle = '#000000';
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#000000';
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Hydrogens (White, tetrahedral arrangement - 2D projection)
            ctx.fillStyle = '#ffffff';
            const bondLen = 12;
            const angles = [0, 90, 180, 270];

            angles.forEach(angleRad => {
                const rad = angleRad * Math.PI / 180;
                ctx.beginPath();
                ctx.arc(bondLen * Math.cos(rad), bondLen * Math.sin(rad), 2.5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.angle += this.rotSpeed;

            // Bounce off walls with random variation to prevent sticking
            if (this.x < 0) {
                this.x = 0;
                this.vx = Math.abs(this.vx) * (0.8 + Math.random() * 0.4);
                this.vx += (Math.random() - 0.5) * 0.2;
            }
            if (this.x > width) {
                this.x = width;
                this.vx = -Math.abs(this.vx) * (0.8 + Math.random() * 0.4);
                this.vx -= (Math.random() - 0.5) * 0.2;
            }
            if (this.y < 0) {
                this.y = 0;
                this.vy = Math.abs(this.vy) * (0.8 + Math.random() * 0.4);
                this.vy += (Math.random() - 0.5) * 0.2;
            }
            if (this.y > height) {
                this.y = height;
                this.vy = -Math.abs(this.vy) * (0.8 + Math.random() * 0.4);
                this.vy -= (Math.random() - 0.5) * 0.2;
            }
        }
    }

    // Create water molecules
    const molecules = [];
    const waterCount = 400;
    for (let i = 0; i < waterCount; i++) {
        molecules.push(new Molecule(true));
    }

    // Create methane molecules
    const methaneCount = 5;
    for (let i = 0; i < methaneCount; i++) {
        molecules.push(new Molecule(false));
    }

    // Physics & Distance Measurement
    function physicsAndMeasure() {
        let sumDist = 0;
        let moleculeCount = molecules.length;

        for (let i = 0; i < molecules.length; i++) {
            let m1 = molecules[i];
            let minDist = Infinity;

            for (let j = 0; j < molecules.length; j++) {
                if (i === j) continue;
                
                let m2 = molecules[j];
                let dx = m1.x - m2.x;
                let dy = m1.y - m2.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < minDist) {
                    minDist = dist;
                }

                // Repulsion force
                // Methane has larger effective radius
                let repulsionDist = m1.isWater && m2.isWater ? 50 : 60;
                if (dist < repulsionDist) {
                    let force = (repulsionDist - dist) / repulsionDist;
                    let angle = Math.atan2(dy, dx);
                    
                    // Methane molecules are slightly "lighter" (move more)
                    let m1Mass = m1.isWater ? 1.0 : 0.8;
                    let m2Mass = m2.isWater ? 1.0 : 0.8;
                    
                    let fx = Math.cos(angle) * force * 0.3 * m2Mass;
                    let fy = Math.sin(angle) * force * 0.3 * m2Mass;
                    m1.vx += fx * m2Mass; m1.vy += fy * m2Mass;
                    m2.vx -= fx * m1Mass; m2.vy -= fy * m1Mass;
                }
            }
            sumDist += minDist;
        }

        // Calculate spatial average (only measure water-water distances)
        let waterCount = 0;
        let waterDistSum = 0;
        
        for (let i = 0; i < molecules.length; i++) {
            if (!molecules[i].isWater) continue;
            
            let m1 = molecules[i];
            let minDist = Infinity;

            for (let j = 0; j < molecules.length; j++) {
                if (i === j) continue;
                if (!molecules[j].isWater) continue;
                
                let m2 = molecules[j];
                let dx = m1.x - m2.x;
                let dy = m1.y - m2.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < minDist) {
                    minDist = dist;
                }
            }
            sumDist += minDist;
            waterCount++;
        }

        let avgDistPixels = sumDist / waterCount;
        let avgDistAngstrom = avgDistPixels / PIXELS_PER_ANGSTROM;

        return avgDistAngstrom;
    }

    function updateUI(avgDist) {
        valEl.innerText = avgDist.toFixed(2);
        
        if (avgDist < 3.2) {
            valEl.style.color = '#4facfe';
        } else {
            valEl.style.color = '#ff6b6b';
        }
    }

    // FPS tracking
    let lastTime = Date.now();
    let frameCount = 0;

    function draw() {
        ctx.fillStyle = 'rgba(17, 17, 17, 0.3)';
        ctx.fillRect(0, 0, width, height);

        // Calculate distances
        let avgDist = physicsAndMeasure();
        
        // Update all molecules
        molecules.forEach(m => m.update());
        
        // Draw all molecules
        molecules.forEach(m => m.draw(ctx));

        updateUI(avgDist);

        frameCount++;
        const now = Date.now();
        if (now - lastTime >= 1000) {
            fpsEl.innerText = frameCount;
            frameCount = 0;
            lastTime = now;
        }

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
